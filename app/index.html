<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>bar-kanri（本番実装 / dev）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;500;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ロック画面（§3 単一パスワード） -->
  <div id="lock-screen" hidden>
    <form id="lock-form">
      <h1>Bar 収支管理</h1>
      <p class="sub">パスワードを入力してください</p>
      <input
        type="password"
        id="lock-password"
        autocomplete="current-password"
        placeholder="パスワード"
        aria-label="パスワード"
      />
      <button type="submit" class="btn btn-primary">ロック解除</button>
      <p id="lock-error" hidden>パスワードが違います</p>
    </form>
  </div>

  <!-- アプリ本体（解錠後に表示） -->
  <div id="app-main" class="app" hidden>

    <!-- デスクトップ用サイドバー -->
    <aside class="sidebar">
      <div class="brand">Bar 収支</div>
      <div class="store-switch" data-store-switch>
        <button type="button" data-store-btn="スタンド">スタンド</button>
        <button type="button" data-store-btn="サンライズ">サンライズ</button>
      </div>
      <nav class="nav">
        <button type="button" class="nav-btn active" data-page="dashboard">ダッシュボード</button>
        <button type="button" class="nav-btn" data-page="input">入力</button>
        <button type="button" class="nav-btn" data-page="history">履歴</button>
        <button type="button" class="nav-btn" data-page="summary">集計</button>
        <button type="button" class="nav-btn" data-page="settings">設定</button>
      </nav>
      <div class="sidebar-bottom">
        <button type="button" class="logout-link">ログアウト</button>
      </div>
    </aside>

    <!-- モバイル用ヘッダー -->
    <header class="mobile-header">
      <span class="brand">Bar 収支</span>
      <div class="store-switch sm" data-store-switch>
        <button type="button" data-store-btn="スタンド">スタンド</button>
        <button type="button" data-store-btn="サンライズ">サンライズ</button>
      </div>
      <button type="button" class="logout-link">ログアウト</button>
    </header>

    <!-- 本文（各画面: ダッシュボード / 入力 / 履歴 / 集計 / 設定。シフトは将来実装） -->
    <main class="content">
      <section id="page-dashboard" class="page active">
        <div class="page-header"><div class="label">Dashboard</div><h1>ダッシュボード</h1></div>
        <div class="mvp-title">今月のMVP</div>
        <div class="mvp-row" id="dash-mvp"></div>
        <div class="tabs" id="dash-period">
          <button type="button" class="tab active" data-period="today">今日</button>
          <button type="button" class="tab" data-period="month">今月</button>
        </div>
        <div class="dash-summary" id="dash-summary"></div>
        <div class="section-title">スタッフ別実績</div>
        <div class="tabs" id="dash-metric">
          <button type="button" class="tab active" data-metric="sales">売上</button>
          <button type="button" class="tab" data-metric="groups">組数</button>
          <button type="button" class="tab" data-metric="drinks">ドリンク</button>
        </div>
        <div id="dash-staff"></div>
      </section>

      <section id="page-input" class="page">
        <div class="page-header"><div class="label">Input</div><h1>入力</h1></div>
        <div class="card">
          <div class="tabs" id="input-tabs">
            <button type="button" class="tab active" data-input-tab="sale">売上</button>
            <button type="button" class="tab" data-input-tab="expense">支出</button>
          </div>

          <!-- 売上入力（伝票単位・§7.1） -->
          <form id="form-sale" class="form" novalidate>
            <label class="field"><span class="field-label">日付</span>
              <input type="date" id="sale-date" required></label>
            <label class="field"><span class="field-label">主担当（席担当）</span>
              <select id="sale-primary" required></select></label>
            <label class="field"><span class="field-label">伝票総額</span>
              <input type="number" id="sale-total" inputmode="numeric" min="0" placeholder="0" required></label>
            <div class="field">
              <span class="field-label">明細（担当 × ドリンク数）</span>
              <div id="sale-details" class="detail-list"></div>
              <button type="button" id="sale-add-detail" class="btn btn-add btn-block">＋ 担当を追加</button>
            </div>
            <div class="field"><span class="field-label">客層（複数選択可・任意）</span>
              <div class="chips" id="sale-ages"></div></div>
            <label class="field"><span class="field-label">メモ（任意）</span>
              <input type="text" id="sale-memo" placeholder="例: 週末営業分"></label>
            <div class="back-preview" id="sale-back-preview" hidden></div>
            <button type="submit" class="btn btn-primary btn-block">伝票を登録</button>
            <p class="form-msg" id="sale-msg" hidden></p>
          </form>

          <!-- 支出入力（§7.2） -->
          <form id="form-expense" class="form" novalidate hidden>
            <label class="field"><span class="field-label">日付</span>
              <input type="date" id="exp-date" required></label>
            <label class="field"><span class="field-label">金額</span>
              <input type="number" id="exp-amount" inputmode="numeric" min="0" placeholder="0" required></label>
            <label class="field"><span class="field-label">カテゴリ</span>
              <select id="exp-category" required></select></label>
            <label class="field"><span class="field-label">メモ（任意）</span>
              <input type="text" id="exp-memo" placeholder="例: 酒屋仕入れ"></label>
            <button type="submit" class="btn btn-primary btn-block">支出を登録</button>
            <p class="form-msg" id="exp-msg" hidden></p>
          </form>
        </div>
      </section>

      <section id="page-history" class="page">
        <div class="page-header"><div class="label">History</div><h1>履歴</h1></div>
        <div class="month-nav">
          <button type="button" id="hist-prev" aria-label="前の月">‹</button>
          <span id="hist-month-label" class="month-label">—</span>
          <button type="button" id="hist-next" aria-label="次の月">›</button>
        </div>
        <div class="tabs" id="hist-filter">
          <button type="button" class="tab active" data-hist-filter="all">すべて</button>
          <button type="button" class="tab" data-hist-filter="sale">売上</button>
          <button type="button" class="tab" data-hist-filter="expense">支出</button>
        </div>
        <div id="hist-list"></div>
      </section>

      <section id="page-summary" class="page">
        <div class="page-header"><div class="label">Summary</div><h1>集計</h1></div>
        <div class="month-nav">
          <button type="button" id="sum-prev" aria-label="前の月">‹</button>
          <span id="sum-month-label" class="month-label">—</span>
          <button type="button" id="sum-next" aria-label="次の月">›</button>
        </div>
        <button type="button" id="sum-pdf" class="btn btn-primary btn-block" style="margin-bottom:14px;">📄 PDFで出力</button>
        <p id="pdf-msg" class="form-msg" hidden style="margin-bottom:14px;"></p>
        <div id="sum-body"></div>
      </section>

      <section id="page-settings" class="page">
        <div class="page-header"><div class="label">Settings</div><h1>設定</h1></div>
        <div class="card">
          <h2>スタッフ管理</h2>
          <div class="staff-add">
            <input type="text" id="staff-new" placeholder="スタッフ名">
            <button type="button" id="staff-add-btn" class="btn btn-primary">追加</button>
          </div>
          <div id="staff-list"></div>
          <p class="form-msg" id="staff-msg" hidden></p>
        </div>

        <div class="card">
          <h2>バック設定</h2>
          <div class="form">
            <label class="field"><span class="field-label">売上バック率（%）</span>
              <input type="number" id="set-rate" min="0" max="100" step="0.1"></label>
            <label class="field"><span class="field-label">ドリンクバック単価（円/杯）</span>
              <input type="number" id="set-unit" min="0" inputmode="numeric"></label>
            <button type="button" id="set-save" class="btn btn-primary btn-block">保存</button>
            <p class="form-msg" id="set-msg" hidden></p>
          </div>
        </div>

        <div class="card">
          <h2>月次目標</h2>
          <div class="form">
            <label class="field"><span class="field-label">対象月</span>
              <input type="month" id="goal-month"></label>
            <label class="field"><span class="field-label">目標売上（円）</span>
              <input type="number" id="goal-target" min="0" inputmode="numeric" placeholder="例: 1500000"></label>
            <button type="button" id="goal-save" class="btn btn-primary btn-block">保存</button>
            <p class="form-msg" id="goal-msg" hidden></p>
          </div>
        </div>

        <div class="card">
          <h2>店舗</h2>
          <p class="muted" style="margin-bottom:12px;">表示・登録の対象店舗を切り替えます。</p>
          <div class="store-switch" data-store-switch>
            <button type="button" data-store-btn="スタンド">スタンド</button>
            <button type="button" data-store-btn="サンライズ">サンライズ</button>
          </div>
        </div>

        <div class="card">
          <h2>シフト機能</h2>
          <p class="muted">将来実装予定（今回スコープ外・別案件）。</p>
        </div>
      </section>
    </main>

    <!-- モバイル用 下タブ -->
    <nav class="tabbar">
      <button type="button" class="active" data-page="dashboard"><span class="ic">🏠</span><span>ホーム</span></button>
      <button type="button" data-page="input"><span class="ic">✏️</span><span>入力</span></button>
      <button type="button" data-page="history"><span class="ic">📋</span><span>履歴</span></button>
      <button type="button" data-page="summary"><span class="ic">📊</span><span>集計</span></button>
      <button type="button" data-page="settings"><span class="ic">⚙️</span><span>設定</span></button>
    </nav>

  </div>

  <!-- PDF出力用（jsPDF+html2canvas／画面では非表示） -->
  <div id="print-report"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
